name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Configure git identity (worktree/integration tests commit)
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
      # Default run excludes live-LLM evals (pyproject addopts: -m 'not eval');
      # no API keys or executor CLIs are required.
      - name: Test
        run: python -m pytest -q
      - name: Generator smoke (skill bundles build from a fresh clone)
        run: python generator/build_skill.py --all
